<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Movie Genre Classifier</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 100px; padding: 10px; margin-bottom: 10px; box-sizing: border-box; }
        button { background-color: #007BFF; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; padding: 15px; border-radius: 5px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <h2>🎬 Movie Genre Classifier</h2>
    <p>Enter a movie description to find out its genre:</p>
    
    <textarea id="movieInput">A thief who steals corporate secrets through the use of dream-sharing technology is given the inverse task of planting an idea into the mind of a C.E.O.</textarea>
    <button onclick="classifyMovie()">Classify Genre</button>

    <div id="result"></div>

    <script>
        async function classifyMovie() {
            const description = document.getElementById('movieInput').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.style.display = 'block';
            resultDiv.className = '';
            resultDiv.innerText = 'Analyzing...';

            try {
                // This sends the text directly to our Python backend server running locally
                const response = await fetch('http://127.0.0.1:5000/classify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: description })
                });

                const data = await response.json();

                if (response.ok) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `<strong>Predicted Genre:</strong> ${data.genre} (${data.confidence}%)`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerText = 'Error: ' + data.error;
                }
            } catch (err) {
                resultDiv.className = 'error';
                resultDiv.innerText = 'Could not connect to backend server.';
            }
        }
    </script>
</body>
</html>
